<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Domino Play Premium</title>
    <style>
        :root {
            --bg-main: #060b14;
            --table-gradient: radial-gradient(circle, #0a251c 0%, #040e0a 100%);
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8a99ad;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #app-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        .screen { 
            display: none !important; 
            position: absolute; 
            width: 100%; height: 100%; 
            top: 0; left: 0; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 5;
        }
        
        .screen.active { display: flex !important; }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn-premium {
            background: linear-gradient(135deg, #00f0ff 0%, #0072ff 100%);
            border: none; color: white;
            padding: 14px 28px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            border-radius: 8px; cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .btn-premium:active { transform: scale(0.95); box-shadow: 0 0 5px rgba(0, 240, 255, 0.8); }
        .btn-premium.green { background: linear-gradient(135deg, #39ff14 0%, #00aa22 100%); box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }

        /* MESA PREMIUM CENTRALIZADA */
        #game-board {
            width: 90%; height: 55%;
            background: var(--table-gradient);
            border: 12px solid #1a110b;
            border-radius: 24px; position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            overflow: x: auto; overflow-y: hidden;
            padding: 20px; box-sizing: border-box;
        }

        #board-center {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; position: relative; min-width: min-content;
            transition: all 0.3s ease;
        }
        
        /* CONTAINER DA MÃO DO JOGADOR - CENTRALIZADO E SEPARADO */
        #player-hand {
            position: absolute; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px; padding: 12px 24px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px; border: 1px solid var(--glass-border);
            max-width: 95vw; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* DESIGN PREMIUM ORIGINAL DE PEDRA REAL DE DOMINÓ (MARFIM) */
        .domino-piece {
            width: 52px; height: 100px;
            background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 8px; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.8);
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28), box-shadow 0.2s ease;
            position: relative; box-sizing: border-box; padding: 6px;
            flex-shrink: 0; border: 1px solid #d4d4d4;
        }
        
        /* Linha divisória de metal central */
        .domino-piece::after {
            content: ''; position: absolute; width: 88%; height: 2px;
            background: linear-gradient(90deg, #ccc, #666, #ccc); top: 50%; transform: translateY(-50%);
            left: 6%; z-index: 2;
        }
        
        .domino-piece:hover { transform: translateY(-15px) scale(1.04); box-shadow: 0 12px 24px rgba(0,0,0,0.6), 0 0 15px var(--neon-blue); }
        
        /* ADAPTAÇÃO PARA PEÇAS HORIZONTAIS NA MESA */
        .domino-piece.horizontal {
            width: 100px; height: 52px; flex-direction: row;
        }
        .domino-piece.horizontal::after {
            width: 2px; height: 88%; top: 6%; left: 50%; transform: translateX(-50%);
        }

        /* CORPO DAS METADES DA PEDRA (GRID DE PONTOS) */
        .domino-half {
            width: 40px; height: 40px; display: grid;
            grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            gap: 2px; padding: 2px; box-sizing: border-box; position: relative;
        }

        /* PONTOS PRETOS (BOLINHAS) PREMIUM */
        .dot {
            background: #111111; border-radius: 50%; width: 8px; height: 8px;
            margin: auto; box-shadow: inset 0 1px 1px rgba(0,0,0,0.6);
            opacity: 0; /* Controlado dinamicamente via JS */
        }
        .dot.active { opacity: 1; }

        .turn-indicator {
            position: absolute; top: 15px; right: 15px;
            padding: 8px 16px; border-radius: 20px;
            font-weight: bold; text-transform: uppercase; z-index: 10;
        }
        .my-turn { background: rgba(57, 255, 20, 0.2); border: 1px solid var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .other-turn { background: rgba(255, 0, 0, 0.2); border: 1px solid #ff0055; color: #ff0055; }

        /* Ajustes de responsividade para telas menores (Celulares) */
        @media (max-width: 768px) {
            .domino-piece { width: 42px; height: 80px; padding: 4px; }
            .domino-piece.horizontal { width: 80px; height: 42px; }
            .domino-half { width: 32px; height: 32px; }
            .dot { width: 6px; height: 6px; }
            #game-board { height: 45%; width: 95%; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <canvas id="bg-particles" style="position:absolute; top:0; left:0; pointer-events:none; z-index:1;"></canvas>

        <div id="screen-login" class="screen active">
            <div class="glass-panel" style="padding: 40px; text-align: center; width: 300px;">
                <h1 style="color: var(--neon-blue); text-shadow: 0 0 10px rgba(0,240,255,0.5); margin-bottom: 5px;">DOMINÓ PLAY</h1>
                <p style="color: var(--text-secondary); margin-top: 0; font-size: 14px;">Experiência Premium Brasileira</p>
                <input type="text" id="username" placeholder="Digite seu Nome" style="padding: 12px; margin: 20px 0; width: 90%; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); color: #fff; text-align:center; font-size: 16px;">
                <br>
                <button id="btn-login" class="btn-premium" style="width: 100%;">Entrar no Lobby</button>
            </div>
        </div>

        <div id="screen-lobby" class="screen">
            <div class="glass-panel" style="padding: 40px; width: 300px; display:flex; flex-direction:column; gap:20px;">
                <h2 style="text-align: center; margin:0;">Salas Online</h2>
                <button id="btn-create-room" class="btn-premium green">Criar Sala Privada</button>
                <div style="border-top: 1px solid var(--glass-border);"></div>
                <input type="text" id="room-code-input" placeholder="CÓDIGO DA SALA" style="padding: 12px; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: #fff; text-align: center; font-weight: bold; font-size: 16px;">
                <button id="btn-join-room" class="btn-premium">Entrar com Código</button>
            </div>
        </div>

        <div id="screen-game" class="screen">
            <div id="turn-badge" class="turn-indicator other-turn">Aguardando...</div>
            <div id="game-board">
                <div id="board-center"></div>
            </div>
            <div id="player-hand"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db, ref, set, onValue, update, signInAnonymously } from "./src/js/config/firebase.js";

        let localPlayer = { id: null, name: "" };
        let currentRoomCode = null;

        // Fundo com Partículas Animadas
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array.from({length: 40}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 2 + 1, d: Math.random() * 0.5 + 0.2
        }));
        function drawParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(0, 240, 255, 0.15)";
            ctx.beginPath();
            particles.forEach(p => {
                ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
                p.y -= p.d; if(p.y < 0) p.y = canvas.height;
            });
            ctx.fill(); requestAnimationFrame(drawParticles);
        }
        drawParticles();

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Login Sincronizado
        document.getElementById('btn-login').addEventListener('click', async () => {
            const nameInput = document.getElementById('username').value.trim();
            if(!nameInput) return alert("Por favor, digite seu nome de jogador.");
            try {
                localPlayer.name = nameInput;
                const cred = await signInAnonymously(auth);
                localPlayer.id = cred.user.uid;
                changeScreen('screen-lobby');
            } catch (error) {
                alert("Erro ao conectar ao Firebase.");
            }
        });

        // MAPEAMENTO E RENDERIZADOR MATEMÁTICO DE PONTOS (BOLINHAS REALISTAS)
        // Mapeia os índices corretos em um Grid 3x3 para posicionar os pontos do dominó tradicional
        const DOT_MAPS = {
            0: [],
            1: [4],
            2: [0, 8],
            3: [0, 4, 8],
            4: [0, 2, 6, 8],
            5: [0, 2, 4, 6, 8],
            6: [0, 2, 3, 5, 6, 8]
        };

        function gerarHtmlMetadePeca(valor) {
            let html = `<div class="domino-half">`;
            const ativos = DOT_MAPS[valor] || [];
            for (let i = 0; i < 9; i++) {
                const isActive = ativos.includes(i) ? 'active' : '';
                html += `<div class="dot ${isActive}"></div>`;
            }
            html += `</div>`;
            return html;
        }

        function criarElementoDomino(l, r, extraClasse = '') {
            const el = document.createElement('div');
            el.className = `domino-piece ${extraClasse}`;
            el.innerHTML = gerarHtmlMetadePeca(l) + gerarHtmlMetadePeca(r);
            return el;
        }

        // Geração do Baralho de 28 Peças
        function criarBaralhoCompleto() {
            let pecas = [];
            let id = 0;
            for (let i = 0; i <= 6; i++) {
                for (let j = i; j <= 6; j++) {
                    pecas.push({ id: `p_${id++}`, l: i, r: j });
                }
            }
            for (let i = pecas.length - 1; i > 0; i--) {
                const k = Math.floor(Math.random() * (i + 1));
                [pecas[i], pecas[k]] = [pecas[k], pecas[i]];
            }
            return pecas;
        }

        // Criar Sala Privada
        document.getElementById('btn-create-room').addEventListener('click', async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            const pool = criarBaralhoCompleto();
            const maoCriador = pool.splice(0, 7);
            
            const state = {
                status: "waiting",
                turn: localPlayer.id,
                board: { left_edge: null, right_edge: null, played_pieces: [] },
                deck: pool,
                players: { [localPlayer.id]: { name: localPlayer.name, is_online: true } },
                hands: { [localPlayer.id]: maoCriador }
            };

            try {
                await set(ref(db, `rooms/${code}`), state);
                currentRoomCode = code;
                alert(`Sala Criada com Sucesso! Código: ${currentRoomCode}`);
                changeScreen('screen-game');
                listenToRoom(currentRoomCode);
            } catch (e) { alert("Erro ao criar sala."); }
        });

        // Entrar com Código
        document.getElementById('btn-join-room').addEventListener('click', async () => {
            const code = document.getElementById('room-code-input').value.toUpperCase().trim();
            if(!code) return alert("Insira o código da sala.");

            const roomRef = ref(db, `rooms/${code}`);
            onValue(roomRef, async (snapshot) => {
                if (!snapshot.exists()) return alert("Sala não encontrada.");
                const room = snapshot.val();
                
                if (room.status === "waiting" && !room.players[localPlayer.id]) {
                    let deckAtual = [...room.deck];
                    const maoOponente = deckAtual.splice(0, 7);

                    let updates = {};
                    updates[`/players/${localPlayer.id}`] = { name: localPlayer.name, is_online: true };
                    updates[`/hands/${localPlayer.id}`] = maoOponente;
                    updates[`/deck`] = deckAtual;
                    updates[`/status`] = "playing";

                    await update(roomRef, updates);
                    currentRoomCode = code;
                    changeScreen('screen-game');
                    listenToRoom(currentRoomCode);
                }
            }, { onlyOnce: true });
        });

        // Ouvinte de Mudanças do Firebase em Tempo Real
        function listenToRoom(code) {
            onValue(ref(db, `rooms/${code}`), (snapshot) => {
                if (snapshot.exists()) renderGame(snapshot.val());
            });
        }

        // Sintetizador de Voz Feminina Nativa Sem Atrasos
        function narrarPecaOficial(left, right) {
            if (!('speechSynthesis' in window)) return;
            let frase = "";
            if (left === right) {
                const nomesCarroça = ["Duplo Branco", "Duplo Ás", "Duplo Duque", "Duplo Terno", "Duplo Quadra", "Duplo Quina", "Duplo Seis"];
                frase = nomesCarroça[left];
            } else {
                const nomesNormais = { 0: "Branco", 1: "Ás", 2: "Duque", 3: "Terno", 4: "Quadra", 5: "Quina", 6: "Seis" };
                frase = `${nomesNormais[Math.max(left, right)]} com ${nomesNormais[Math.min(left, right)]}`;
            }

            const fala = new SpeechSynthesisUtterance(frase);
            fala.lang = "pt-BR"; fala.rate = 1.2;
            
            const vozes = window.speechSynthesis.getVoices();
            const vozFeminina = vozes.find(v => v.lang.includes("pt-BR") && (v.name.toLowerCase().includes("maria") || v.name.toLowerCase().includes("google") || v.name.toLowerCase().includes("zira") || v.name.toLowerCase().includes("luciana")));
            if(vozFeminina) fala.voice = vozFeminina;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(fala);
        }

        // MOTOR DE RENDERIZAÇÃO E LOGICA DE ENCAIXE DO DOMINÓ REAL
        function renderGame(room) {
            const badge = document.getElementById('turn-badge');
            const isMyTurn = room.turn === localPlayer.id;

            if (isMyTurn) {
                badge.textContent = "Sua Vez";
                badge.className = "turn-indicator my-turn";
            } else {
                const oponente = Object.values(room.players).find(p => p.name !== localPlayer.name)?.name || "Oponente";
                badge.textContent = `Vez de ${oponente}`;
                badge.className = "turn-indicator other-turn";
            }

            // CORREÇÃO DO TABULEIRO: Desenha as peças perfeitamente com bolinhas pretas
            const boardCenter = document.getElementById('board-center');
            boardCenter.innerHTML = "";
            
            const played = room.board.played_pieces || [];
            played.forEach((piece) => {
                const isCarroça = piece.l === piece.r;
                // Aplica classe horizontal automática para deitar a pedra se for ponta comum
                const pecaMesa = criarElementoDomino(piece.l, piece.r, isCarroça ? '' : 'horizontal');
                boardCenter.appendChild(pecasMesa);
            });

            // Dispara a áudio-narração síncrona se uma nova jogada for registrada
            if(played.length > 0 && room.last_played_id !== window.lastPlayedTracked) {
                const ultima = played[played.length - 1];
                narrarPecaOficial(ultima.l, ultima.r);
                window.lastPlayedTracked = room.last_played_id;
            }

            // RENDERIZAR PEÇAS NA MÃO DO JOGADOR LOCAL COM DESIGN PREMIUM COMPLETO
            const handContainer = document.getElementById('player-hand');
            handContainer.innerHTML = "";
            
            const minhaMao = room.hands?.[localPlayer.id] || [];

            // Validação inteligente de fechamento de jogadas
            let temJogadaValida = false;
            minhaMao.forEach(p => {
                if (room.board.left_edge === null || p.l === room.board.left_edge || p.r === room.board.left_edge || p.l === room.board.right_edge || p.r === room.board.right_edge) {
                    temJogadaValida = true;
                }
            });

            // Passa a vez automaticamente em caso de trava na mão do jogador
            if (room.status === "playing" && isMyTurn && minhaMao.length > 0 && !temJogadaValida) {
                setTimeout(async () => {
                    const proxTurno = Object.keys(room.players).find(id => id !== localPlayer.id);
                    await update(ref(db, `rooms/${currentRoomCode}`), { turn: proxTurno });
                    alert("Você não possui peças compatíveis. Passando a vez!");
                }, 1600);
            }

            // Insere cada elemento de marfim na mão do usuário
            minhaMao.forEach((p, index) => {
                const elPeca = criarElementoDomino(p.l, p.r);
                
                elPeca.onclick = async () => {
                    if (!isMyTurn) return alert("Aguarde o seu turno!");
                    
                    let lMesa = room.board.left_edge;
                    let rMesa = room.board.right_edge;
                    let novaPeca = { ...p };
                    let encaixou = false;

                    // Mecânica de Encaixe Tradicional e Rotação Matemática de Lados
                    if (lMesa === null) {
                        lMesa = p.l; rMesa = p.r; encaixou = true;
                        room.board.played_pieces = [novaPeca];
                    } else if (p.r === lMesa) {
                        lMesa = p.l; encaixou = true;
                        room.board.played_pieces.unshift(novaPeca);
                    } else if (p.l === lMesa) {
                        novaPeca.l = p.r; novaPeca.r = p.l; // Inverte os lados visualmente
                        lMesa = p.r; encaixou = true;
                        room.board.played_pieces.unshift(novaPeca);
                    } else if (p.l === rMesa) {
                        rMesa = p.r; encaixou = true;
                        room.board.played_pieces.push(novaPeca);
                    } else if (p.r === rMesa) {
                        novaPeca.l = p.r; novaPeca.r = p.l; // Inverte os lados visualmente
                        rMesa = p.l; encaixou = true;
                        room.board.played_pieces.push(novaPeca);
                    }

                    if (!encaixou) return alert("Jogada Inválida! Escolha uma peça compatível com as pontas da mesa.");

                    const novaMao = [...minhaMao];
                    novaMao.splice(index, 1);

                    let updates = {};
                    updates[`/board/left_edge`] = lMesa;
                    updates[`/board/right_edge`] = rMesa;
                    updates[`/board/played_pieces`] = room.board.played_pieces;
                    updates[`/hands/${localPlayer.id}`] = novaMao;
                    updates[`/last_played_id`] = Math.random().toString();

                    if (novaMao.length === 0) {
                        updates[`/status`] = "finished";
                        alert("Sensacional! Você bateu todas as peças e venceu o jogo!");
                    } else {
                        updates[`/turn`] = Object.keys(room.players).find(id => id !== localPlayer.id);
                    }

                    await update(ref(db, `rooms/${currentRoomCode}`), updates);
                };
                handContainer.appendChild(elPeca);
            });
        }
        
        if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }
    </script>
</body>
</html>
