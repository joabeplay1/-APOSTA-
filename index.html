<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador Universal de Apps</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>🚀 Gerador Universal de Apps</h1>

<p>Crie Sites, Aplicativos e Jogos automaticamente.</p>

</header>

<main>

<div class="painel">

<label>Tipo do Projeto</label>

<select id="tipo">

<option value="site">Site</option>

<option value="app">Aplicativo</option>

<option value="jogo">Jogo</option>

</select>

<label>Título</label>

<input id="titulo" placeholder="Meu Projeto">

<label>Cor Principal</label>

<input type="color" id="cor" value="#0066ff">

<button onclick="gerarProjeto()">

Gerar Projeto

</button>

</div>

<div id="preview"></div>

</main>

<script src="script.js"></script>

</body>
</html>
