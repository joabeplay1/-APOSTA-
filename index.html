<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suíte Premium — Sistema Base</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="domino-premium-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; background: radial-gradient(circle at center, #0b0612 0%, #030408 100%);"></canvas>

    <div id="loading-screen" class="overlay">
        <div class="loader-content">
            <h2>SUITE PREMIUM</h2>
            <p>Carregando ambiente...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="glass-card">
            <h1 class="logo">PLATAFORMA <span>PREMIUM</span></h1>
            <p class="subtitle">Ambiente operacional moderno de alta performance</p>
            
            <div class="input-group">
                <label for="player-name">Seu Nome / Usuário</label>
                <input type="text" id="player-name" placeholder="Ex: Joabe Play" maxlength="15">
            </div>

            <div class="actions">
                <button id="btn-create-room" class="btn-primary">Criar Nova Sessão</button>
                <div class="divider"><span>ou</span></div>
                <div class="search-group">
                    <input type="text" id="room-code-input" placeholder="Código de Acesso" maxlength="6">
                    <button id="btn-join-room" class="btn-secondary">Acessar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="waiting-screen" class="screen hidden">
        <div class="glass-card">
            <div class="jesus-reina-banner">JESUS REINA</div>
            
            <h2>Sessão Criada com Sucesso!</h2>
            <p>Compartilhe o código de pareamento com o outro usuário:</p>
            <div class="code-display" id="generated-code">------</div>
            <button id="btn-copy-code" class="btn-small">Copiar Código</button>
            <div class="status-container">
                <div class="pulse-ring"></div>
                <p id="waiting-status">Aguardando conexão...</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <link rel="stylesheet" href="lobby.css">

    <div id="lobby-presence-sidebar" class="lobby-sidebar hidden">
        <div class="sidebar-header">
            <h3>Usuários Online</h3>
            
            <div class="sidebar-name-input-group">
                <label for="sidebar-player-name">Seu nome de exibição:</label>
                <input type="text" id="sidebar-player-name" placeholder="Seu apelido..." maxlength="15">
            </div>

            <div class="my-status-control">
                <select id="select-my-status">
                    <option value="Disponível">🟢 Disponível</option>
                    <option value="Ocupado">🔴 Ocupado</option>
                    <option value="Ausente">🟡 Ausente</option>
                </select>
            </div>
        </div>
        <ul id="online-players-list">
        </ul>
    </div>

    <div id="private-chat-modal" class="chat-modal hidden">
        <div id="draggable-chat-card" class="chat-card">
            <div class="chat-header" id="chat-drag-handle">
                <span id="chat-target-name">Conversa Privada</span>
                <div class="chat-controls-btns">
                    <button id="btn-minimize-chat" class="chat-ctrl-btn" title="Minimizar">—</button>
                    <button id="btn-close-chat" class="chat-ctrl-btn" title="Fechar">&times;</button>
                </div>
            </div>
            <div id="chat-messages-box" class="messages-container">
            </div>
            <div class="chat-footer">
                <input type="text" id="chat-input-message" placeholder="Digite uma mensagem..." maxlength="200">
                <button id="btn-send-message">Enviar</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="lobby.js"></script>
    <script type="text/javascript" src="particles.js" defer></script>

</body>
</html>
