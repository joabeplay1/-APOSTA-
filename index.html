<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó Brasileiro Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="login-box">
        <h1>DOMINÓ BRASILEIRO</h1>
        
        <div class="user-profile">
            <input type="text" id="playerName" placeholder="Digite seu nome">
            <div class="avatar-select">
                <label>Escolha seu Avatar:</label>
                <select id="playerAvatar">
                    <option value="🥷">Ninja</option>
                    <option value="👑">Rei</option>
                    <option value="🦈">Tubarão</option>
                    <option value="🦁">Leão</option>
                </select>
            </div>
        </div>

        <div class="bet-container">
            <label for="betAmount">Aposta da Partida (Moedas):</label>
            <input type="number" id="betAmount" value="100" min="10">
        </div>

        <div class="buttons">
            <button id="createRoom">CRIAR SALA</button>
            <button id="joinRoom">ENTRAR NA SALA</button>
        </div>

        <input type="text" id="roomCode" placeholder="Código da sala para entrar">
        <p id="generatedCode"></p>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="lobby.js"></script>
</body>
</html>
