<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Star Pong - Jogo Espacial</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a1a; overflow:hidden; width:100vw; height:100vh; font-family:sans-serif; }
  canvas { display:block; }
  #hud { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:10;
    display:flex; align-items:center; gap:0; border-radius:10px;
    border:1px solid rgba(0,255,136,0.3); background:rgba(10,10,26,0.85);
    backdrop-filter:blur(8px); overflow:hidden; }
  .score-box { padding:8px 24px; text-align:center; }
  .score-label { font-size:10px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; }
  .score-num { font-size:36px; font-weight:900; }
  .p1 .score-label { color:#00ff88; } .p1 .score-num { color:#00ff88; text-shadow:0 0 10px #00ff88; }
  .ai .score-label { color:#bb66ff; } .ai .score-num { color:#bb66ff; text-shadow:0 0 10px #bb66ff; }
  .vs { padding:8px 12px; color:rgba(255,255,255,.6); font-weight:700; }
  #msg { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:10;
    padding:10px 24px; border-radius:8px; border:1px solid rgba(0,255,136,.4);
    background:rgba(10,10,26,.85); color:#00ff88; font-weight:700; font-size:13px;
    letter-spacing:.1em; white-space:nowrap; display:none; }
  #menu { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:24px; z-index:20; background:rgba(10,10,26,.7); }
  #menu h1 { font-size:clamp(2rem,6vw,4rem); font-weight:900; background:linear-gradient(90deg,#00ff88,#00d4ff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:.1em; }
  #menu p { color:#bb66ff; font-size:13px; letter-spacing:.3em; text-transform:uppercase; }
  #menu button { padding:14px 40px; border-radius:10px; border:2px solid #00ff88;
    background:rgba(0,255,136,.1); color:#00ff88; font-weight:700; font-size:16px;
    letter-spacing:.1em; cursor:pointer; transition:.2s; }
  #menu button:hover { background:rgba(0,255,136,.2); box-shadow:0 0 30px rgba(0,255,136,.3); }
  #winner { color:#00ff88; font-size:clamp(1.2rem,3vw,2rem); font-weight:900; text-align:center;
    text-shadow:0 0 20px #00ff88; }
  .hint { color:rgba(255,255,255,.4); font-size:12px; text-align:center; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="score-box p1"><div class="score-label">Jogador 1</div><div class="score-num" id="sp">0</div></div>
  <div class="vs">VS</div>
  <div class="score-box ai"><div class="score-label">IA</div><div class="score-num" id="sa">0</div></div>
</div>
<div id="msg"></div>
<div id="menu">
  <h1>⭐ STAR PONG</h1>
  <p>Gol Lateral com Buraco Retangular</p>
  <div id="winner"></div>
  <button id="btn">INICIAR JOGO</button>
  <div class="hint">🖱️ Mova o mouse para controlar o taco • 📱 Toque e arraste no celular<br>⭐ Primeiro a marcar 7 gols vence!</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const spEl = document.getElementById('sp');
const saEl = document.getElementById('sa');
const msgEl = document.getElementById('msg');
const menuEl = document.getElementById('menu');
const btnEl = document.getElementById('btn');
const winnerEl = document.getElementById('winner');

const PW=14, PHR=0.18, BR=10, SPD=4, AI_SPD=3.5, GOAL_R=0.35, WT=6, GD=30;
let W, H, state, animId, playing=false, score={p:0,a:0};

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  if(state){ state.w=W; state.h=H; state.paddleH=H*PHR; }
}

function initState(){
  const pH=H*PHR;
  return { w:W,h:H,ball:{x:W/2,y:H/2,vx:(Math.random()>.5?1:-1)*SPD,vy:(Math.random()-.5)*4},
    playerY:H/2-pH/2, aiY:H/2-pH/2, paddleH:pH, goalScored:false, goalTimer:0, galaxyAngle:0, trail:[] };
}

function resetBall(s){
  s.ball={x:W/2,y:H/2,vx:(Math.random()>.5?1:-1)*SPD,vy:(Math.random()-.5)*4};
  s.trail=[]; s.goalScored=false;
}

function goal(who){
  score[who]++;
  spEl.textContent=score.p; saEl.textContent=score.a;
  const txt = who==='p' ? '⭐ GOL! Jogador 1 marcou!' : '⭐ GOL! A IA marcou!';
  msgEl.textContent=txt; msgEl.style.display='block';
  setTimeout(()=>msgEl.style.display='none',3000);
  if(score[who]>=7){ endGame(who); }
}

function endGame(who){
  playing=false; cancelAnimationFrame(animId);
  winnerEl.textContent = who==='p'?'🏆 JOGADOR 1 VENCEU!':'🏆 IA VENCEU!';
  btnEl.textContent='JOGAR NOVAMENTE'; menuEl.style.display='flex';
}

function update(s){
  if(s.goalScored){ s.goalTimer++; if(s.goalTimer>60) resetBall(s); return; }
  s.galaxyAngle+=.005;
  const ac=s.aiY+s.paddleH/2, diff=s.ball.y-ac;
  if(Math.abs(diff)>10) s.aiY+=Math.sign(diff)*Math.min(AI_SPD,Math.abs(diff)*.05+1.5);
  s.aiY=Math.max(0,Math.min(s.h-s.paddleH,s.aiY));
  s.ball.x+=s.ball.vx; s.ball.y+=s.ball.vy;
  s.trail.push({x:s.ball.x,y:s.ball.y}); if(s.trail.length>20) s.trail.shift();
  const gTop=s.h*GOAL_R, gBot=s.h*(1-GOAL_R);
  if(s.ball.y-BR<=WT){s.ball.y=WT+BR;s.ball.vy*=-1;}
  if(s.ball.y+BR>=s.h-WT){s.ball.y=s.h-WT-BR;s.ball.vy*=-1;}
  const lpx=GD+WT;
  if(s.ball.vx<0){
    if(s.ball.x-BR<=lpx+PW&&s.ball.x+BR>=lpx&&s.ball.y>=s.playerY&&s.ball.y<=s.playerY+s.paddleH){
      s.ball.x=lpx+PW+BR; s.ball.vx*=-1.05;
      s.ball.vy=((s.ball.y-s.playerY)/s.paddleH-.5)*6;
    } else if(s.ball.x-BR<=GD+WT){
      if(s.ball.y<gTop||s.ball.y>gBot){ if(s.ball.x-BR<=0){s.goalScored=true;s.goalTimer=0;goal('a');} }
      else{s.ball.x=GD+WT+BR;s.ball.vx*=-1;}
    }
  }
  const rpx=s.w-GD-WT-PW;
  if(s.ball.vx>0){
    if(s.ball.x+BR>=rpx&&s.ball.x-BR<=rpx+PW&&s.ball.y>=s.aiY&&s.ball.y<=s.aiY+s.paddleH){
      s.ball.x=rpx-BR; s.ball.vx*=-1.05;
      s.ball.vy=((s.ball.y-s.aiY)/s.paddleH-.5)*6;
    } else if(s.ball.x+BR>=s.w-GD-WT){
      if(s.ball.y<gTop||s.ball.y>gBot){ if(s.ball.x+BR>=s.w){s.goalScored=true;s.goalTimer=0;goal('p');} }
      else{s.ball.x=s.w-GD-WT-BR;s.ball.vx*=-1;}
    }
  }
  const spd=Math.sqrt(s.ball.vx**2+s.ball.vy**2);
  if(spd>12){s.ball.vx=s.ball.vx/spd*12;s.ball.vy=s.ball.vy/spd*12;}
}

function drawGalaxy(cx,cy,r,a){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(a);
  const g=ctx.createRadialGradient(0,0,0,0,0,r);
  g.addColorStop(0,'rgba(100,120,255,.3)'); g.addColorStop(.3,'rgba(80,60,200,.15)');
  g.addColorStop(.6,'rgba(60,20,150,.08)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  for(let arm=0;arm<2;arm++){
    ctx.beginPath();
    for(let i=0;i<200;i++){
      const t=i/200,a2=t*Math.PI*3+arm*Math.PI,d=t*r*.9;
      const x=Math.cos(a2)*d,y=Math.sin(a2)*d*.6;
      if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle='rgba(120,140,255,.2)'; ctx.lineWidth=3; ctx.stroke();
  }
  ctx.restore();
}

function drawGoal(s,side,gTop,gBot){
  const isL=side==='left', color=isL?'#00ff88':'#bb66ff';
  const x=isL?GD:s.w-GD;
  ctx.shadowColor=color; ctx.shadowBlur=15; ctx.strokeStyle=color; ctx.lineWidth=WT; ctx.globalAlpha=.8;
  ctx.beginPath(); ctx.moveTo(x,gTop); ctx.lineTo(x,gBot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,gTop);
  if(isL){ctx.lineTo(0,gTop);ctx.moveTo(0,WT);ctx.lineTo(x,WT);}
  else{ctx.lineTo(s.w,gTop);ctx.moveTo(s.w,WT);ctx.lineTo(x,WT);}
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,gBot);
  if(isL){ctx.lineTo(0,gBot);ctx.moveTo(0,s.h-WT);ctx.lineTo(x,s.h-WT);}
  else{ctx.lineTo(s.w,gBot);ctx.moveTo(s.w,s.h-WT);ctx.lineTo(x,s.h-WT);}
  ctx.stroke();
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.fillStyle=color+'08';
  ctx.fillRect(isL?0:s.w-GD,WT,GD,gTop-WT);
  ctx.fillRect(isL?0:s.w-GD,gBot,GD,s.h-gBot-WT);
}

function drawPaddle(x,y,h,color){
  ctx.shadowColor=color; ctx.shadowBlur=25;
  const cx=x+PW/2,cy=y+h/2,hR=PW*.85;
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,color+'22'); g.addColorStop(.5,color); g.addColorStop(1,color+'22');
  ctx.fillStyle=g; ctx.beginPath();
  ctx.roundRect(cx-PW*.27,cy-h*.27,PW*.55,h*.55,PW*.27); ctx.fill();
  ctx.beginPath(); ctx.arc(cx,y+hR*.7,hR,0,Math.PI*2); ctx.fillStyle=color+'cc'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,y+h-hR*.7,hR,0,Math.PI*2); ctx.fillStyle=color+'cc'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,PW*.2,0,Math.PI*2); ctx.fillStyle='#ffffff33'; ctx.fill();
  ctx.shadowBlur=0;
}

function drawNeonLine(x1,y1,x2,y2,c1,c2,w){
  const g=ctx.createLinearGradient(x1,y1,x2,y2);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.strokeStyle=g; ctx.lineWidth=w; ctx.shadowColor=c1; ctx.shadowBlur=15;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.shadowBlur=0;
}

function drawStar(x,y,r,trail){
  if(trail.length>1){
    for(let i=1;i<trail.length;i++){
      const t=i/trail.length,p=trail[i-1],c=trail[i];
      const tg=ctx.createLinearGradient(p.x,p.y,c.x,c.y);
      tg.addColorStop(0,`rgba(180,100,255,${t*.15})`);
      tg.addColorStop(1,`rgba(0,212,255,${t*.5})`);
      ctx.beginPath(); ctx.lineWidth=t*r*1.4; ctx.strokeStyle=tg;
      ctx.lineCap='round'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=10;
      ctx.moveTo(p.x,p.y); ctx.lineTo(c.x,c.y); ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.lineWidth=1;
  }
  ctx.shadowColor='#00d4ff'; ctx.shadowBlur=40;
  const aura=ctx.createRadialGradient(x,y,0,x,y,r*2.5);
  aura.addColorStop(0,'rgba(0,212,255,.3)'); aura.addColorStop(1,'rgba(0,212,255,0)');
  ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(x,y,r*2.5,0,Math.PI*2); ctx.fill();
  ctx.shadowColor='#fff'; ctx.shadowBlur=20;
  const oR=r*1.4,iR=r*.55;
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rad=i%2===0?oR:iR,a=Math.PI*i/5-Math.PI/2;
    const sx=x+Math.cos(a)*rad,sy=y+Math.sin(a)*rad;
    if(i===0)ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
  }
  ctx.closePath();
  const sg=ctx.createRadialGradient(x,y,0,x,y,oR);
  sg.addColorStop(0,'#fff'); sg.addColorStop(.4,'#00d4ff'); sg.addColorStop(1,'#7b2fff');
  ctx.fillStyle=sg; ctx.fill();
  ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(x,y,r*.3,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1; ctx.shadowColor='#fff'; ctx.shadowBlur=6;
  for(let i=0;i<4;i++){
    const a=Math.PI/4*i,len=r*1.8;
    ctx.beginPath(); ctx.moveTo(x+Math.cos(a)*r*.4,y+Math.sin(a)*r*.4);
    ctx.lineTo(x+Math.cos(a)*len,y+Math.sin(a)*len); ctx.stroke();
  }
  ctx.shadowBlur=0;
}

function draw(s){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W/2);
  bg.addColorStop(0,'#1a0a2e'); bg.addColorStop(.5,'#0f0a1a'); bg.addColorStop(1,'#050510');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  drawGalaxy(W/2,H/2,Math.min(W,H)*.22,s.galaxyAngle);
  ctx.setLineDash([8,12]); ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
  const gTop=H*GOAL_R, gBot=H*(1-GOAL_R);
  drawGoal(s,'left',gTop,gBot); drawGoal(s,'right',gTop,gBot);
  drawNeonLine(0,WT/2,W,WT/2,'#00ff88','#bb66ff',WT);
  drawNeonLine(0,H-WT/2,W,H-WT/2,'#bb66ff','#00ff88',WT);
  drawPaddle(GD+WT,s.playerY,s.paddleH,'#00ff88');
  drawPaddle(W-GD-WT-PW,s.aiY,s.paddleH,'#bb66ff');
  drawStar(s.ball.x,s.ball.y,BR,s.trail);
}

function loop(){
  if(!playing)return;
  update(state); draw(state);
  animId=requestAnimationFrame(loop);
}

window.addEventListener('resize',resize);
canvas.addEventListener('mousemove',e=>{
  if(!state)return;
  const r=canvas.getBoundingClientRect();
  state.playerY=Math.max(0,Math.min(H-state.paddleH,e.clientY-r.top-state.paddleH/2));
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault(); if(!state)return;
  const r=canvas.getBoundingClientRect();
  state.playerY=Math.max(0,Math.min(H-state.paddleH,e.touches[0].clientY-r.top-state.paddleH/2));
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); if(!state)return;
  const r=canvas.getBoundingClientRect();
  state.playerY=Math.max(0,Math.min(H-state.paddleH,e.touches[0].clientY-r.top-state.paddleH/2));
},{passive:false});

btnEl.addEventListener('click',()=>{
  score={p:0,a:0}; spEl.textContent='0'; saEl.textContent='0';
  winnerEl.textContent=''; menuEl.style.display='none';
  resize(); state=initState(); playing=true; loop();
});

resize();
</script>
</body>
</html>
