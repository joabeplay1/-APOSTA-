<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Jogo - Dominó Brasileiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesa">
        <div class="header-jogo">
            <div id="p1Display" class="player-info">Aguardando Jogador 1...</div>
            <div id="statusVez" class="status-vez">Aguardando início...</div>
            <div id="p2Display" class="player-info">Aguardando Jogador 2...</div>
        </div>

        <div class="placar-container">
            <span id="displayCodigo">SALA: ----</span>
            <span id="displayAposta">APOSTA: $0</span>
            <span id="displayStatus">STATUS: Conectando...</span>
        </div>

        <div class="tabuleiro-wrapper">
            <div id="gameBoard" class="game-board">
                </div>
        </div>

        <div class="controles-jogo">
            <button id="btnComprar" class="btn-acao" disabled>COMPRAR PEÇA</button>
            <button id="btnPassar" class="btn-acao" style="display: none;">PASSAR VEZ</button>
            <button id="btnIniciar" class="btn-acao" style="background: #238636; display: none;">INICIAR PARTIDA</button>
        </div>

        <div class="player-hand-container">
            <div id="playerHand" class="player-hand">
                </div>
        </div>

        <div class="chat-container">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-box">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="btnEnviarChat">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="jogo.js"></script>
</body>
</html>
